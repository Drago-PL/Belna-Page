<!-- Slasher the game  -->

<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<title>Slasher the game</title>
<style>
  body { margin: 0; overflow: hidden; cursor: grab; }
  #gameOver { position: absolute; top: 50%; left:50%; transform: translate(-50%, -50%);
              font-size: 48px; color: red; display: none; z-index: 10; }
</style>
</head>
<body>
<div id="gameOver">GAME OVER! zostałeś złapany przez Ghostfaca!</div>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.0/build/three.min.js"></script>
<script>
  // Obiekt do śledzenia klawiszy
  window.keys = {};

  let scene, camera, renderer;
  let ghost, player;
  let clock = new THREE.Clock();
  let gameOver = false;

  // Kąty kamery i odległość
  let cameraAngles = { phi: Math.PI/4, theta: Math.PI/4 }; // kąt pionowy i poziomy
  const radius = 5;

  // Obsługa myszy
  let isMouseDown = false;
  let previousMousePosition = { x: 0, y: 0 };

  init();
  animate();

  function init() {
    // Tworzymy scenę
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x000000);

    // Kamera
    camera = new THREE.PerspectiveCamera(
      75, window.innerWidth / window.innerHeight, 0.1, 1000
    );
    updateCameraPosition();

    // Renderer
    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // Podłoga
    const floorGeometry = new THREE.PlaneGeometry(50, 50);
    const floorMaterial = new THREE.MeshStandardMaterial({ color: 0x222222 });
    const floor = new THREE.Mesh(floorGeometry, floorMaterial);
    floor.rotation.x = -Math.PI/2;
    scene.add(floor);

    // Oświetlenie
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
    scene.add(ambientLight);
    const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
    directionalLight.position.set(10, 20, 10);
    scene.add(directionalLight);

    // Gracz
    const playerGeometry = new THREE.BoxGeometry(0.5, 1.8, 0.5);
    const playerMaterial = new THREE.MeshStandardMaterial({ color: 0x00ff00 });
    player = new THREE.Mesh(playerGeometry, playerMaterial);
    player.position.y = 0.9;
    scene.add(player);

    // Ghost
    const ghostGeometry = new THREE.SphereGeometry(1, 32, 32);
    const ghostMaterial = new THREE.MeshStandardMaterial({ color: 0xff0000, transparent: true, opacity: 0.7 });
    ghost = new THREE.Mesh(ghostGeometry, ghostMaterial);
    ghost.position.set(0, 1, -20);
    scene.add(ghost);

    // Klawisze
    document.addEventListener('keydown', (e) => { window.keys[e.key.toLowerCase()] = true; });
    document.addEventListener('keyup', (e) => { window.keys[e.key.toLowerCase()] = false; });

    // Mysza do obracania kamery
    document.addEventListener('mousedown', (e) => {
      if (gameOver) return;
      isMouseDown = true;
      previousMousePosition.x = e.clientX;
      previousMousePosition.y = e.clientY;
    });
    document.addEventListener('mouseup', () => {
      if (gameOver) return;
      isMouseDown = false;
    });
    document.addEventListener('mousemove', (e) => {
      if (!isMouseDown || gameOver) return;

      const deltaX = e.clientX - previousMousePosition.x;
      const deltaY = e.clientY - previousMousePosition.y;
      const sensitivity = 0.005;

      cameraAngles.theta -= deltaX * sensitivity;
      cameraAngles.phi -= deltaY * sensitivity;

      // Ograniczenia dla phi (kąt pionowy)
      const minPhi = 0.1;
      const maxPhi = Math.PI - 0.1;
      cameraAngles.phi = Math.max(minPhi, Math.min(maxPhi, cameraAngles.phi));

      updateCameraPosition();

      previousMousePosition.x = e.clientX;
      previousMousePosition.y = e.clientY;
    });

    document.body.style.cursor = 'grab';

    // Resize
    window.addEventListener('resize', () => {
      if (gameOver) return;
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  }

  function updateCameraPosition() {
    // Pozycja kamery względem gracza
    const x = player.position.x + radius * Math.sin(cameraAngles.phi) * Math.sin(cameraAngles.theta);
    const y = player.position.y + radius * Math.cos(cameraAngles.phi);
    const z = player.position.z + radius * Math.sin(cameraAngles.phi) * Math.cos(cameraAngles.theta);
    camera.position.set(x, y, z);
    camera.lookAt(player.position);
  }

  function animate() {
    if (gameOver) return; // zatrzymujemy animację po zakończeniu

    requestAnimationFrame(animate);
    const delta = clock.getDelta();

    // Ruch gracza
    const moveSpeed = 5; // jednostek na sekundę
    if (window.keys['w']) {
      player.position.z -= moveSpeed * delta;
    }
    if (window.keys['s']) {
      player.position.z += moveSpeed * delta;
    }
    if (window.keys['a']) {
      player.position.x -= moveSpeed * delta;
    }
    if (window.keys['d']) {
      player.position.x += moveSpeed * delta;
    }

    // Aktualizacja kamery, aby podążała za graczem
    updateCameraPosition();

    // Przemieszczanie Ghostfacem
    const ghostSpeed = 2; // jednostek na sekundę
    const direction = new THREE.Vector3();
    direction.subVectors(player.position, ghost.position).normalize();
    ghost.position.addScaledVector(direction, ghostSpeed * delta);

    // Sprawdzanie kolizji
    if (ghost.position.distanceTo(player.position) < 1.5) {
      endGame();
    }

    renderer.render(scene, camera);
  }

  function endGame() {
    document.getElementById('gameOver').style.display = 'block';
    gameOver = true;
  }
</script>
</body>
</html>
